# ============================================================
# CCTV SMART MONITOR - CONFIGURATION FILE
# ============================================================
# All settings are customizable from here OR from the web dashboard.
# Supports 1 to 16 cameras. Everything is beginner-friendly.
# ============================================================

# --- GENERAL SETTINGS ---
app:
  name: "Smart CCTV Monitor"
  demo_mode: false
  frame_skip: 3
  country: "india"
  max_cameras: 16

# ============================================================
# CAMERAS (1 to 16 channels)
# ============================================================
cameras:
  - name: "CH1 - Main Gate"
    source: "rtsp://admin:password@192.168.1.101:554/stream1"
    type: "rtsp"
    enabled: true
    detect_faces: true
    detect_plates: true
    detect_vehicles: true
    detect_loitering: true
    detect_mask: true
    count_entry_exit: true

  - name: "CH2 - Back Gate"
    source: "rtsp://admin:password@192.168.1.102:554/stream1"
    type: "rtsp"
    enabled: true
    detect_faces: true
    detect_plates: true
    detect_vehicles: true
    detect_loitering: true
    detect_mask: true
    count_entry_exit: true

# --- FACE RECOGNITION ---
face_recognition:
  tolerance: 0.6
  min_face_size: 20
  save_unknown_faces: true
  cooldown_seconds: 30

# --- MASK DETECTION ---
mask_detection:
  enabled: true
  send_photo_telegram: true
  send_message_whatsapp: true
  confidence: 0.5

# --- NUMBER PLATE (INDIAN ANPR) ---
anpr:
  enabled: true
  save_plate_images: true
  confidence: 0.5

# --- VEHICLE DETECTION ---
vehicle_detection:
  enabled: true
  types:
    - car
    - motorcycle
    - bus
    - truck
    - auto_rickshaw
    - bicycle
  helmet_detection: false
  save_vehicle_images: true

# --- THREAT/THEFT DETECTION ---
threat_detection:
  enabled: true
  loitering:
    enabled: true
    time_threshold: 120
    area_threshold: 100
  motion_sensitivity: 0.5
  crowd:
    enabled: true
    max_people: 10

# --- ENTRY/EXIT COUNTING ---
entry_exit:
  enabled: true
  line_position: 0.5
  line_direction: "horizontal"
  daily_reset_time: "00:00"

# --- NIGHT MODE ---
night_mode:
  enabled: true
  auto_detect: true
  schedule:
    start: "18:00"
    end: "06:00"
  enhancement_level: 2

# --- ALERTS (configurable from web dashboard too) ---
alerts:
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
    send_photo: true
    two_way_enabled: true

  whatsapp:
    enabled: false
    account_sid: ""
    auth_token: ""
    from_number: "whatsapp:+14155238886"
    to_number: ""

  sound:
    enabled: true
    beep_on_threat: true

  webhook:
    enabled: false
    url: ""

# --- DAILY REPORT ---
daily_report:
  enabled: true
  generate_time: "23:59"
  send_telegram: true
  send_whatsapp: true
  save_pdf: false

# --- STORAGE & AUTO-DELETE (per category) ---
storage:
  database: "storage/cctv_monitor.db"
  faces_dir: "storage/faces"
  plates_dir: "storage/plates"
  vehicles_dir: "storage/vehicles"
  recordings_dir: "recordings"
  compress_images: true
  image_quality: 60
  max_storage_mb: 5000

  # Auto-delete settings PER CATEGORY
  # Set to 0 = never delete, any number = days to keep
  auto_delete:
    faces: 0              # NEVER delete face data (default)
    vehicles: 30          # Delete vehicle records after 30 days
    number_plates: 30     # Delete plate records after 30 days
    events: 30            # Delete alerts/events after 30 days
    recordings: 14        # Delete video clips after 14 days
    visitors: 0           # NEVER delete visitor log (default)
    entry_exit: 30        # Delete entry/exit records after 30 days
    daily_stats: 90       # Delete daily reports after 90 days

# --- WEB DASHBOARD ---
web:
  enabled: true
  port: 5000
  host: "0.0.0.0"
  auth:
    enabled: true
    username: "admin"
    password: "admin123"
  allow_camera_config: true
  allow_alert_config: true

# --- VISITOR LOG ---
visitor_log:
  enabled: true
  track_repeats: true
  regular_threshold: 5
  categories:
    - resident
    - visitor
    - delivery
    - suspicious
    - unknown
